<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOWARDS THE OTHER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  :root { --fg:#f4f4f4; --dim:#6f6f6f; --red:#ff2118; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  body { font-family: 'Space Mono', 'Courier New', monospace; color: var(--fg); }

  #scene { position: fixed; inset: 0; display: block; cursor: grab; }
  #scene.grabbing { cursor: grabbing; }

  .hud { position: fixed; inset: 0; pointer-events: none; color: var(--fg);
         text-transform: uppercase; }
  .corner { position: absolute; }
  .tl-blk { top: 32px; left: 72px; }
  .tr-blk { top: 32px; right: 72px; text-align: right; }
  .bl-blk { bottom: 32px; left: 72px; }
  .br-blk { bottom: 32px; right: 72px; text-align: right; }

  .tag { font-size: 10px; letter-spacing: 3px; color: var(--dim); margin-bottom: 5px; }
  .big { font-size: 20px; letter-spacing: 2px; font-weight: 700;
         display: flex; align-items: center; gap: 13px; }
  .tr-blk .big { justify-content: flex-end; }
  .data { font-size: 12px; letter-spacing: 1.5px; line-height: 1.85; }
  .data b { color: var(--dim); font-weight: 400; }
  .bval { font-size: 14px; letter-spacing: 1.5px; margin-top: 2px; }

  .rec { width: 11px; height: 11px; border-radius: 50%; background: var(--red);
         box-shadow: 0 0 10px var(--red); animation: blink 1.3s steps(1) infinite; }
  @keyframes blink { 50% { opacity: .12; } }

  .bracket { position: absolute; width: 40px; height: 40px; border: 1.5px solid var(--fg); opacity: .8; }
  .b-tl { top: 100px; left: 72px; border-right: none; border-bottom: none; border-radius: 11px 0 0 0; }
  .b-tr { top: 100px; right: 72px; border-left: none; border-bottom: none; border-radius: 0 11px 0 0; }
  .b-bl { bottom: 100px; left: 72px; border-right: none; border-top: none; border-radius: 0 0 0 11px; }
  .b-br { bottom: 100px; right: 72px; border-left: none; border-top: none; border-radius: 0 0 11px 0; }

  .device-label { position: fixed; transform: translate(-50%, 0);
                  color: var(--fg); font-size: 13px; letter-spacing: 3px;
                  text-transform: uppercase; pointer-events: none;
                  text-align: center; white-space: nowrap;
                  font-weight: 700; transition: opacity .2s; }

  /* shared pill style */
  .pill { pointer-events: auto; cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
          border: 1px solid rgba(255,255,255,.55); border-radius: 100px; padding: 9px 22px;
          color: var(--fg); background: rgba(0,0,0,.4);
          font: 700 12px/1 'Space Mono', monospace; letter-spacing: 3px; text-transform: uppercase;
          transition: opacity .15s, border-color .15s, color .15s, background .15s; }
  .pill:hover { background: rgba(255,255,255,.07); }
  .pill.on { background: rgba(255,255,255,.10); border-color: var(--fg); color: var(--fg); }
  .pill .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); }
  .pill.on .dot { background: var(--fg); box-shadow: 0 0 8px var(--fg); }

  /* bottom nav bar: ← START → */
  .nav { position: fixed; left: 50%; bottom: 36px; transform: translateX(-50%);
         display: flex; gap: 14px; align-items: center; z-index: 8; pointer-events: auto; }
  .nav .arrow { width: 56px; height: 56px; padding: 0; border-radius: 50%;
                font-size: 24px; letter-spacing: 0; display: flex;
                align-items: center; justify-content: center; }
  .nav .start { min-width: 140px; padding: 18px 32px; font-size: 14px; }
  .nav .arrow:disabled { opacity: .25; cursor: not-allowed; }

  /* top right: settings */
  .top-bar { position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
             display: flex; gap: 10px; z-index: 8; }

  /* settings overlay */
  .settings { position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
              background: rgba(0,0,0,.78); z-index: 9; pointer-events: auto; }
  .settings.show { display: flex; }
  .panel { width: min(640px, 86vw); border: 1px solid rgba(255,255,255,.35); border-radius: 4px;
           padding: 38px 44px; background: rgba(0,0,0,.85);
           display: flex; flex-direction: column; gap: 28px; }
  .panel h2 { font-size: 11px; letter-spacing: 4px; color: var(--dim); font-weight: 400;
              text-transform: uppercase; margin-bottom: 10px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }

  .sens { display: flex; flex-direction: column; gap: 10px; }
  .sens-track { display: flex; align-items: center; gap: 14px; }
  .sens input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 2px;
                            background: rgba(255,255,255,.3); outline: none; }
  .sens input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px;
                            border-radius: 50%; background: var(--fg); cursor: pointer; }
  .sens input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border: 0; border-radius: 50%;
                            background: var(--fg); cursor: pointer; }
  .sens-val { font-size: 12px; letter-spacing: 2px; color: var(--dim); min-width: 60px; text-align: right; }

  /* intro overlay */
  .enable { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,.7); z-index: 20;
            color: var(--fg); text-transform: uppercase; pointer-events: auto; }
  .enable.hide { display: none; }
  .enable-box { border: 1px solid rgba(255,255,255,.3); padding: 32px 40px; border-radius: 4px;
                background: rgba(0,0,0,.5);
                display: flex; flex-direction: column; gap: 22px; align-items: center; }
  .enable-box h2 { font-size: 11px; letter-spacing: 4px; color: var(--dim);
                   font-weight: 400; text-transform: uppercase; }

  .fx { position: fixed; inset: 0; pointer-events: none; }
  .fx.scan { background: repeating-linear-gradient(to bottom,
             rgba(255,255,255,.035) 0 1px, transparent 1px 3px); mix-blend-mode: overlay; }
  .fx.vig { box-shadow: inset 0 0 240px 50px rgba(0,0,0,.92); }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="fx vig"></div>
  <div class="fx scan"></div>

  <div class="hud">
    <div class="corner tl-blk">
      <div class="tag">// subject</div>
      <div class="big">GUEST.03</div>
    </div>
    <div class="corner tr-blk">
      <div class="tag">rec <span id="tc">00:00:00:00</span></div>
      <div class="big">TOWARDS THE OTHER <span class="rec"></span></div>
    </div>

    <div class="bracket b-tl"></div>
    <div class="bracket b-tr"></div>
    <div class="bracket b-bl"></div>
    <div class="bracket b-br"></div>

    <div class="corner bl-blk">
      <div class="tag">// source</div>
      <div class="bval" id="envName">environmental.02</div>
    </div>

    <div class="device-label" id="lbl0">BRUIT_CALL</div>
    <div class="device-label" id="lbl1">ENVIRONMENTAL.02</div>
    <div class="device-label" id="lbl2">MOURNING_DOVE</div>

    <div class="corner br-blk">
      <div class="tag">// proximity</div>
      <div class="bval" id="distance">0 meters away</div>
    </div>
  </div>

  <!-- top: settings -->
  <div class="top-bar">
    <button class="pill" id="settingsBtn"><span class="dot"></span> settings</button>
  </div>

  <!-- bottom: ← START → -->
  <div class="nav">
    <button class="pill arrow" id="prevBtn">‹</button>
    <button class="pill start"  id="startBtn">START</button>
    <button class="pill arrow" id="nextBtn">›</button>
  </div>

  <!-- intro overlay (Safari/iOS gesture gate) -->
  <div class="enable" id="enable">
    <div class="enable-box">
      <h2>// tap to begin</h2>
      <button class="pill" id="enableBtn">enter</button>
    </div>
  </div>

  <!-- settings overlay -->
  <div class="settings" id="settings">
    <div class="panel">
      <div class="sens">
        <h2>// sensitivity <span id="sensLabel" style="color:var(--dim)">low &middot; high</span></h2>
        <div class="sens-track">
          <input type="range" id="sens" min="0" max="100" value="60">
          <span class="sens-val" id="sensVal">60%</span>
        </div>
      </div>

      <div>
        <h2>// center source (environmental.02)</h2>
        <div class="row">
          <button class="pill" data-src="computer">Computer mic</button>
          <button class="pill" data-src="playback">Playback (mourning dove)</button>
        </div>
      </div>

      <div class="row" style="justify-content:flex-end; margin-top: 6px;">
        <button class="pill" id="closeBtn">close</button>
      </div>
    </div>
  </div>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');
const elTC = document.getElementById('tc');
const elEnv = document.getElementById('envName');
const elDist = document.getElementById('distance');
const deviceLabels = [
  document.getElementById('lbl0'),
  document.getElementById('lbl1'),
  document.getElementById('lbl2'),
];

const RAMP = " .:-=+*oO#%";
const FONT = 12;

// === CONFIG: sample files + center "Playback" source ========================
const SAMPLE_LEFT    = 'sample1_bruit.mp3';
const SAMPLE_RIGHT   = 'sample2.mp3';
const PLAYBACK_SRC   = 'sample3_mourningDove.mp3';

// Which source the center device uses: 'computer' (iPad mic) or 'playback'.
let centerSource = localStorage.getItem('centerSource') || 'computer';

// User-controlled sensitivity (0..1). Higher = more reactive viz.
let sensitivity = (parseInt(localStorage.getItem('sens') || '60', 10)) / 100;

// === AUDIO PIPELINE ==========================================================
// One AudioContext + one shared AnalyserNode. The "current source" feeds it:
//   mic  : MediaStreamSource → analyser
//   side : AudioBufferSource → analyser → destination (audible)
//   play : AudioBufferSource → analyser → destination (audible)
// We never re-capture audio via the mic anymore — every analyzed signal goes
// directly into the analyser, so loudness/clarity is identical to the source.
let actx = null, analyser = null, freqBytes = null;
let sampleRate = 44100, fftSize = 1024;
let micStream = null, micSrcNode = null, micReady = false;
let sampleSrcNode = null;
const sampleBufCache = new Map();   // url → AudioBuffer

let currentTrack = null, currentMode = 'standby', running = false;

async function ensureCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') await actx.resume();
  sampleRate = actx.sampleRate;
  if (!analyser) {
    analyser = actx.createAnalyser();
    analyser.fftSize = fftSize;
    analyser.smoothingTimeConstant = 0.72;
    freqBytes = new Uint8Array(analyser.frequencyBinCount);
  }
}
async function ensureMic() {
  if (micReady) return true;
  try {
    await ensureCtx();
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    });
    micSrcNode = actx.createMediaStreamSource(micStream);
    micReady = true;
    return true;
  } catch (e) {
    console.warn('[mic] denied/blocked', e);
    return false;
  }
}
function disconnectCurrent() {
  try { if (micSrcNode) micSrcNode.disconnect(); } catch {}
  try {
    if (sampleSrcNode) {
      try { sampleSrcNode.stop(); } catch {}
      sampleSrcNode.disconnect();
      sampleSrcNode = null;
    }
  } catch {}
  try { analyser && analyser.disconnect(); } catch {}
}
async function loadSample(url) {
  if (sampleBufCache.has(url)) return sampleBufCache.get(url);
  const r  = await fetch(url);
  const ab = await r.arrayBuffer();
  const buf = await actx.decodeAudioData(ab);
  sampleBufCache.set(url, buf);
  return buf;
}
async function startMic() {
  await ensureCtx();
  if (!(await ensureMic())) return;
  disconnectCurrent();
  micSrcNode.connect(analyser);
  // Mic NOT connected to destination on purpose — we don't want feedback.
  clearCloud();
  running = true;
  currentMode = 'mic';
  currentTrack = null;
}
async function playSampleUrl(url, key) {
  await ensureCtx();
  disconnectCurrent();
  const buf = await loadSample(url);
  sampleSrcNode = actx.createBufferSource();
  sampleSrcNode.buffer = buf;
  sampleSrcNode.loop = true;
  sampleSrcNode.connect(analyser);
  analyser.connect(actx.destination);    // audible playback
  sampleSrcNode.start();
  clearCloud();
  running = true;
  currentMode = key;
  currentTrack = url;
}

function clearCloud() {
  nodes.length = 0; edges.length = 0;
  seqCounter = 0; lastSpawn = 0; levelSmooth = 0; peak = 0;
  focusX = focusY = focusZ = 0;
}

let W = window.innerWidth, H = window.innerHeight;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// === CLOUD VIZ ==============================================================
const MAX_NODES = 520;
const SPAWN_MS  = 50;
const THRESH    = 0.015;   // lowered (was 0.035) — combined with sensitivity
const SPREAD_X  = 520;
const SPREAD_Y  = 480;
const SPREAD_Z  = 520;
const JITTER    = 26;
const LINK_K    = 3;
const LINK_R    = 150;
const LINK_R2   = LINK_R * LINK_R;

const nodes = [];
const edges = [];
let seqCounter = 0;
let lastSpawn = 0;
let levelSmooth = 0, peak = 0;
const startTime = performance.now();

const HZ_MIN = 120, HZ_MAX = 9000;
function hzToHue(hz) {
  const t = Math.max(0, Math.min(1,
    (Math.log(Math.max(hz, HZ_MIN)) - Math.log(HZ_MIN)) /
    (Math.log(HZ_MAX) - Math.log(HZ_MIN))));
  return t * 245;
}

function analyse(now) {
  if (!analyser) return { domHz: 0 };
  analyser.getByteFrequencyData(freqBytes);
  const bins  = freqBytes;
  const used  = bins.length;
  const binSR = sampleRate;

  let level = 0, centroid = 0, magSum = 0, domBin = 0, domVal = 0, spread = 0;
  for (let i = 0; i < used; i++) {
    const m = bins[i];
    level += m; centroid += i * m; magSum += m;
    if (m > domVal) { domVal = m; domBin = i; }
  }
  level = level / (used * 255);
  centroid = magSum > 0 ? centroid / magSum / used : 0;
  if (magSum > 0) {
    const cb = centroid * used;
    let varSum = 0;
    for (let i = 0; i < used; i++) varSum += bins[i] * (i - cb) * (i - cb);
    spread = Math.min(1, Math.sqrt(varSum / magSum) / (used * 0.5));
  }

  // Apply user sensitivity (0..1 → 0.5..4.5×) and clamp.
  const gain = 0.5 + sensitivity * 4.0;
  level = Math.min(1, level * gain);

  levelSmooth += (level - levelSmooth) * 0.30;
  peak = Math.max(peak * 0.99, levelSmooth);
  const domHz = domBin * binSR / fftSize;

  if (running && level > THRESH && now - lastSpawn > SPAWN_MS) {
    lastSpawn = now;
    const energy = Math.max(0, Math.min(1, level * 6));
    const node = {
      seq: seqCounter++,
      x: (centroid - 0.5) * SPREAD_X + (Math.random() - 0.5) * JITTER,
      y: -(level - 0.08) * 2200 + (Math.random() - 0.5) * JITTER,
      z: (spread - 0.4) * SPREAD_Z + (Math.random() - 0.5) * JITTER,
      energy, p: null,
      hue: hzToHue(domHz || (HZ_MIN + centroid * (HZ_MAX - HZ_MIN))),
      glyph: RAMP[Math.min(RAMP.length - 1, Math.floor((0.25 + energy * 0.75) * RAMP.length))],
    };
    const near = [];
    for (const m of nodes) {
      const dx = m.x - node.x, dy = m.y - node.y, dz = m.z - node.z;
      const d2 = dx * dx + dy * dy + dz * dz;
      if (d2 < LINK_R2) near.push({ m, d2 });
    }
    near.sort((p, q) => p.d2 - q.d2);
    for (let k = 0; k < Math.min(LINK_K, near.length); k++) edges.push([node, near[k].m]);
    nodes.push(node);
    while (nodes.length > MAX_NODES) {
      const removed = nodes.shift();
      for (let e = edges.length - 1; e >= 0; e--)
        if (edges[e][0] === removed || edges[e][1] === removed) edges.splice(e, 1);
    }
  }
  return { domHz };
}

let D = 560;
const FOV = 470;
let yaw = 0.4;
const PITCH = 0.32;
let focusX = 0, focusY = 0, focusZ = 0;
let CX = 0, CY = 0;

function project(x, y, z, cosA, sinA, cosB, sinB) {
  x -= focusX; y -= focusY; z -= focusZ;
  const x1 = x * cosA + z * sinA;
  const z1 = -x * sinA + z * cosA;
  const y2 = y * cosB - z1 * sinB;
  const z2 = y * sinB + z1 * cosB;
  const zc = z2 + D;
  if (zc < 1) return null;
  const s = FOV / zc;
  return { sx: CX + x1 * s, sy: CY + y2 * s, s, zc };
}

const ILLUS = [
  { mode: 'sample1', label: 'environmental.01', dist: '358 meters away' },
  { mode: 'mic',     label: 'environmental.02', dist: '0 meters away'   },
  { mode: 'sample2', label: 'environmental.03', dist: '819 meters away' },
];
let activeIndex = 1;
let offset = null, offsetTarget = null;
let ILLUS_R = 240, SPACING = 540;
let dragging = false, moved = false, startPX = 0, startOffset = 0;
let settleAt = null;
const FADE_DELAY = 0.5, FADE_DUR = 0.7, FADE_MIN = 0.16;

function deviceX(i) { return W / 2 + (i * SPACING - offset); }

async function triggerSource(i) {
  if (i === 0)      await playSampleUrl(SAMPLE_LEFT,  'sample1');
  else if (i === 1) {
    if (centerSource === 'playback') await playSampleUrl(PLAYBACK_SRC, 'mic');
    else                              await startMic();
  }
  else if (i === 2) await playSampleUrl(SAMPLE_RIGHT, 'sample2');
}

function setActiveIndex(i) {
  i = Math.max(0, Math.min(ILLUS.length - 1, i));
  if (i === activeIndex) return;
  activeIndex = i;
  // Stop whatever is playing — wait for START button to engage the new source.
  disconnectCurrent();
  running = false;
  currentMode = 'standby';
  currentTrack = null;
  clearCloud();
  updateNavButtons();
}

function updateNavButtons() {
  document.getElementById('prevBtn').disabled = activeIndex <= 0;
  document.getElementById('nextBtn').disabled = activeIndex >= ILLUS.length - 1;
}

// Swipe del carosello (drag laterale). NESSUN click sul canvas: per attivare
// la sorgente si usa il bottone START in basso.
canvas.addEventListener('pointerdown', e => {
  dragging = true; moved = false; startPX = e.clientX; startOffset = offset;
  canvas.classList.add('grabbing');
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - startPX;
  if (Math.abs(dx) > 5) moved = true;
  offsetTarget = Math.max(0, Math.min((ILLUS.length - 1) * SPACING, startOffset - dx));
});
canvas.addEventListener('pointerup', e => {
  dragging = false;
  canvas.classList.remove('grabbing');
  if (moved) setActiveIndex(Math.round(offset / SPACING));
});

function drawDevice(cx, cy, R, alpha, active, fade = 1) {
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash([]);
  const rimFade = fade + (1 - fade) * 0.25;
  const col = (m, ff = fade) => `rgba(255,255,255,${(m * alpha * ff).toFixed(3)})`;

  ctx.lineWidth = active ? 1.4 : 0.9;
  ctx.strokeStyle = col(0.5, rimFade);
  ctx.setLineDash([6, 8]);
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.lineWidth = 0.8;
  ctx.strokeStyle = col(0.16);
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.9, 0, Math.PI * 2); ctx.stroke();

  ctx.strokeStyle = col(0.34);
  ctx.lineWidth = R * 0.035;
  const i0 = R * 0.17, i1 = R * 0.52;
  ctx.beginPath();
  ctx.moveTo(cx, cy - i0); ctx.lineTo(cx, cy - i1);
  ctx.moveTo(cx, cy + i0); ctx.lineTo(cx, cy + i1);
  ctx.moveTo(cx - i0, cy); ctx.lineTo(cx - i1, cy);
  ctx.moveTo(cx + i0, cy); ctx.lineTo(cx + i1, cy);
  ctx.stroke();

  ctx.fillStyle = col(0.4);
  const hr = Math.max(1.8, R * 0.028), dd = R * 0.73;
  for (const [ox, oy] of [[0, -dd], [0, dd], [-dd, 0], [dd, 0]]) {
    ctx.beginPath(); ctx.arc(cx + ox, cy + oy, hr, 0, Math.PI * 2); ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx, cy, hr * 0.9, 0, Math.PI * 2); ctx.fill();

  if (active) {
    ctx.shadowColor = 'rgba(255,255,255,0.2)';
    ctx.shadowBlur = 16 * rimFade;
    ctx.lineWidth = 1;
    ctx.strokeStyle = col(0.3, rimFade);
    ctx.setLineDash([6, 8]);
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawViz(cosA, sinA, cosB, sinB) {
  if (!nodes.length) return;
  ctx.save();

  for (let i = 0; i < nodes.length; i++)
    nodes[i].p = project(nodes[i].x, nodes[i].y, nodes[i].z, cosA, sinA, cosB, sinB);

  ctx.lineWidth = 1;
  for (let e = 0; e < edges.length; e++) {
    const a = edges[e][0].p, b = edges[e][1].p;
    if (!a || !b) continue;
    if (a.s < 0.05 && b.s < 0.05) continue;
    const al = Math.min(0.3, Math.min(a.s, b.s) * 0.4);
    ctx.strokeStyle = `hsla(${edges[e][0].hue}, 80%, 62%, ${al.toFixed(3)})`;
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy); ctx.stroke();
  }

  const order = [];
  for (let i = 0; i < nodes.length; i++) if (nodes[i].p) order.push(i);
  order.sort((i, j) => nodes[j].p.zc - nodes[i].p.zc);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const i of order) {
    const n = nodes[i], p = n.p;
    if (p.s < 0.04) continue;
    const fs = Math.max(5, Math.min(26, FONT * (0.7 + n.energy * 1.1) * p.s));
    const alpha = Math.max(0.06, Math.min(1, p.s)) * (0.45 + 0.55 * n.energy);
    ctx.font = fs.toFixed(1) + "px 'Courier New', monospace";
    ctx.shadowColor = `hsla(${n.hue}, 95%, 60%, ${alpha.toFixed(3)})`;
    ctx.shadowBlur = 5 + n.energy * 16 * p.s;
    ctx.fillStyle = `hsla(${n.hue}, 92%, ${(56 + n.energy * 16).toFixed(0)}%, ${alpha.toFixed(3)})`;
    ctx.fillText(n.glyph, p.sx, p.sy);
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function frame(now) {
  W = window.innerWidth; H = window.innerHeight;
  ILLUS_R = Math.min(W, H) * 0.3;
  SPACING = ILLUS_R * 2.2;
  CY = H / 2;
  CX = W / 2;
  if (offset === null) { offset = activeIndex * SPACING; offsetTarget = offset; }
  if (!dragging) offsetTarget = activeIndex * SPACING;
  offset += (offsetTarget - offset) * 0.18;

  analyse(now);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  yaw += 0.0016;
  const cosA = Math.cos(yaw), sinA = Math.sin(yaw);
  const cosB = Math.cos(PITCH), sinB = Math.sin(PITCH);

  if (nodes.length) {
    let mx = 0, my = 0, mz = 0;
    for (const n of nodes) { mx += n.x; my += n.y; mz += n.z; }
    mx /= nodes.length; my /= nodes.length; mz /= nodes.length;
    let dsum = 0;
    for (const n of nodes) dsum += Math.hypot(n.x - mx, n.y - my, n.z - mz);
    const meanDist = dsum / nodes.length;
    focusX += (mx - focusX) * 0.04;
    focusY += (my - focusY) * 0.04;
    focusZ += (mz - focusZ) * 0.04;
    const worldR = Math.max(140, meanDist * 2.2);
    let dTarget = worldR * FOV / (ILLUS_R * 0.78);
    dTarget = Math.max(220, Math.min(1500, dTarget));
    D += (dTarget - D) * 0.05;
  }

  const snapped = Math.abs(offset - activeIndex * SPACING) < SPACING * 0.05;
  if (snapped && !dragging) { if (settleAt === null) settleAt = now; }
  else settleAt = null;
  let activeFade = 1;
  if (settleAt !== null) {
    const t = (now - settleAt) / 1000;
    if (t > FADE_DELAY)
      activeFade = 1 - (1 - FADE_MIN) * Math.min(1, (t - FADE_DELAY) / FADE_DUR);
  }

  const idx = [0, 1, 2].sort((a, b) =>
    Math.abs(deviceX(b) - W / 2) - Math.abs(deviceX(a) - W / 2));
  for (const i of idx) {
    const x = deviceX(i);
    const dist = Math.abs(x - W / 2);
    const alpha = Math.max(0.2, 1 - dist / SPACING);
    const active = (i === activeIndex) && snapped;
    drawDevice(x, CY, ILLUS_R, alpha, active, active ? activeFade : 1);
    if (active) drawViz(cosA, sinA, cosB, sinB);
  }

  const labelY = CY + ILLUS_R + 24;
  for (let i = 0; i < deviceLabels.length; i++) {
    const x = deviceX(i);
    const a = Math.max(0.2, 1 - Math.abs(x - W / 2) / SPACING);
    const lbl = deviceLabels[i];
    lbl.style.left = x + 'px';
    lbl.style.top  = labelY + 'px';
    lbl.style.opacity = a.toFixed(3);
  }

  const centerIdx = Math.max(0, Math.min(ILLUS.length - 1, Math.round(offset / SPACING)));
  elEnv.textContent = ILLUS[centerIdx].label;
  elDist.textContent = ILLUS[centerIdx].dist;
  const el = (now - startTime) / 1000;
  const pad = n => String(n).padStart(2, '0');
  elTC.textContent = `${pad(Math.floor(el/3600))}:${pad(Math.floor(el/60)%60)}:${pad(Math.floor(el)%60)}:${pad(Math.floor(el*30)%30)}`;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// === UI HOOKS ===============================================================
const settingsEl = document.getElementById('settings');
document.getElementById('settingsBtn').addEventListener('click', () => settingsEl.classList.add('show'));
document.getElementById('closeBtn').addEventListener('click', () => settingsEl.classList.remove('show'));

const sensEl  = document.getElementById('sens');
const sensVal = document.getElementById('sensVal');
sensEl.value = Math.round(sensitivity * 100);
sensVal.textContent = sensEl.value + '%';
sensEl.addEventListener('input', () => {
  sensitivity = sensEl.value / 100;
  sensVal.textContent = sensEl.value + '%';
  try { localStorage.setItem('sens', sensEl.value); } catch (_) {}
});

function refreshCenterSourceBtns() {
  document.querySelectorAll('.panel [data-src]').forEach(b =>
    b.classList.toggle('on', b.dataset.src === centerSource));
}
document.querySelectorAll('.panel [data-src]').forEach(b => {
  b.addEventListener('click', async () => {
    centerSource = b.dataset.src;
    try { localStorage.setItem('centerSource', centerSource); } catch (_) {}
    refreshCenterSourceBtns();
    // If env.02 is the active device, re-engage immediately with the new source.
    if (activeIndex === 1 && running) await triggerSource(1);
  });
});
refreshCenterSourceBtns();

// nav: ← START →
document.getElementById('prevBtn').addEventListener('click', () => setActiveIndex(activeIndex - 1));
document.getElementById('nextBtn').addEventListener('click', () => setActiveIndex(activeIndex + 1));
document.getElementById('startBtn').addEventListener('click', () => triggerSource(activeIndex));
updateNavButtons();

// Intro overlay: prime the audio context inside a user gesture (Safari/iOS).
document.getElementById('enableBtn').addEventListener('click', async () => {
  await ensureCtx();      // wake AudioContext
  await ensureMic();      // ask for mic permission upfront
  document.getElementById('enable').classList.add('hide');
});
</script>
